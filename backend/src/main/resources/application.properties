spring.application.name=ai-code-review-assistant

# --- Database (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_code_review_db
spring.datasource.username=postgres
spring.datasource.password=Mypostgres17
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads
app.reports.dir=reports

# --- JWT ---
app.jwt.secret=k3J9pQz7XmR2vL8wA1sT4uE6yH0nD5cF
app.jwt.expiration-ms=86400000

# --- OpenAI / LLM ---
openai.api.key=YOUR_OPENAI_API_KEY
openai.api.model=gpt-4o-mini

# --- Server ---
server.port=8080


